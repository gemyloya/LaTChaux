<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Visualisation de mon fichier</title>
    <!-- On garde exactement votre outil de lecture d'origine -->
    <script src="https://cloudflare.com"></script>
    <style>
        /* AJOUT : On centre le tout et on limite la largeur pour que ce soit moins large */
        body { font-family: sans-serif; margin: 40px auto; max-width: 1000px; color: #333; padding: 0 20px; }
        
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f5f7; font-weight: bold; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>

    <!-- AJOUT : Votre nouveau titre personnalisé -->
    <h2>… et alors, le classement mooooonnnndiiiallllllllll</h2>
    <div id="tableau-contenu">Chargement des données...</div>

    <script>
        // On garde exactement votre configuration qui fonctionnait
        const fichierCSV = "LaTChaux24.csv"; 

        Papa.parse(fichierCSV, {
            download: true,
            header: false,
            complete: function(results) {
                let html = '<table>';
                results.data.forEach((row, index) => {
                    if(row.join('').trim() === '') return; 
                    
                    html += '<tr>';
                    row.forEach(cell => {
                        html += index === 0 ? `<th>${cell}</th>` : `<td>${cell}</td>`;
                    });
                    html += '</tr>';
                });
                html += '</table>'; // La fermeture correcte du tableau
                document.getElementById('tableau-contenu').innerHTML = html;
            }
        });
    </script>

</body>
</html>
