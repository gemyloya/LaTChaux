<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Visualisation de mon fichier</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: sans-serif; margin: 40px auto; max-width: 600px; padding: 0 20px; color: #333; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th:nth-child(2), td:nth-child(2) { text-align: left; }
        th { background-color: #2c3e50; color: #ffffff; font-weight: bold; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .erreur { color: #d32f2f; background: #ffebee; padding: 15px; border-left: 5px solid #d32f2f; margin-top: 20px; font-weight: bold; }
        .zone-boutons { margin: 20px 0; display: flex; gap: 10px; }
        .btn-classement { background-color: #2c3e50; color: white; border: none; padding: 10px 15px; font-size: 14px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .btn-classement:hover { background-color: #34495e; }
        .btn-classement.actif { background-color: #27ae60; }
    </style>
</head>
<body>

    <h2>La T'Chaux</h2>

    <div class="zone-boutons">
        <button class="btn-classement actif" id="btn-ann" onclick="chargerClassement('LaTChauxAnn.csv', 'btn-ann')">Classement 2026</button>
        <button class="btn-classement" id="btn-24" onclick="chargerClassement('LaTChaux24.csv', 'btn-24')">Classement mooonndiiallllll</button>
    </div>

    <div id="tableau-contenu">Chargement des données en cours...</div>

    <script>
        function chargerClassement(fichierCSV, idBouton) {
            document.getElementById('tableau-contenu').innerHTML = "Chargement des données en cours...";
            document.querySelectorAll('.btn-classement').forEach(btn => btn.classList.remove('actif'));
            document.getElementById(idBouton).classList.add('actif');

            if (typeof Papa === 'undefined') {
                document.getElementById('tableau-contenu').innerHTML = "<div class='erreur'>⚠️ Erreur critique : L'outil PapaParse n'a pas pu être chargé depuis internet. Vérifiez votre connexion ou les restrictions de votre réseau.</div>";
            } else {
                Papa.parse(fichierCSV, {
                    download: true,
                    header: false,
                    skipEmptyLines: true,
                    complete: function(results) {
                        if (!results.data || results.data.length === 0) {
                            document.getElementById('tableau-contenu').innerHTML = "<div class='erreur'>⚠️ Le fichier CSV a été trouvé mais il semble complètement vide.</div>";
                            return;
                        }
                        let html = '<table>';
                        results.data.forEach((row, index) => {
                            html += '<tr>';
                            row.forEach(cell => {
                                html += index === 0 ? `<th>${cell}</th>` : `<td>${cell}</td>`;
                            });
                            html += '</tr>';
                        });
                        html += '</table>';
                        document.getElementById('tableau-contenu').innerHTML = html;
                    },
                    error: function(err) {
                        document.getElementById('tableau-contenu').innerHTML = `
                            <div class='erreur'>
                                ⚠️ Impossible de lire le fichier CSV.<br><br>
                                <span style='font-weight:normal; font-size:14px;'>
                                    <b>Détails techniques :</b> Le fichier nommé <code>"${fichierCSV}"</code> est introuvable à la racine de votre projet ou son nom contient une erreur de majuscule/minuscule.
                                </span>
                            </div>`;
                    }
                });
            }
        }

        chargerClassement("LaTChauxAnn.csv", "btn-ann");
    </script>

</body>
</html>
