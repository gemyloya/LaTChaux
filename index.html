<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Visualisation de mon fichier</title>
    <!-- CORRECTION 1 : Lien exact pour charger la bibliothèque PapaParse -->
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: sans-serif; margin: 40px; color: #333; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f5f7; font-weight: bold; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>

    <h2>Données de mon fichier CSV</h2>
    <div id="tableau-contenu">Chargement des données...</div>

    <script>
        // CORRECTION 2 : Mettez votre lien complet débutant par https://githubusercontent.com...
        const fichierCSV = "https://raw.githubusercontent.com/gemyloya/LaTChaux/refs/heads/main/LaTChaux24.csv"; 

        Papa.parse(fichierCSV, {
            download: true,
            header: false,
            complete: function(results) {
                let html = '<table>';
                results.data.forEach((row, index) => {
                    // Supprime les lignes vides du CSV
                    if(row.join('').trim() === '') return; 
                    
                    html += '<tr>';
                    row.forEach(cell => {
                        html += index === 0 ? `<th>${cell}</th>` : `<td>${cell}</td>`;
                    });
                    html += '</tr>';
                });
                // CORRECTION 3 : Fermeture correcte de la balise HTML du tableau
                html += '</table>'; 
                document.getElementById('tableau-contenu').innerHTML = html;
            },
            error: function(err) {
                document.getElementById('tableau-contenu').innerHTML = "<p style='color:red;'>Erreur lors du chargement du fichier CSV. Vérifiez votre lien RAW.</p>";
            }
        });
    </script>

</body>
