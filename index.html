<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Visualisation de mon fichier</title>
    <style>
        /* BASE DE LA PAGE */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 40px auto; 
            max-width: 600px; 
            padding: 0 20px; 
            color: #1e293b; 
            /* Transition fluide pour le changement de couleur de fond */
            transition: background-color 0.4s ease; 
        }
        
        /* TABLEAU */
        table { 
            border-collapse: collapse; 
            width: 100%; 
            margin-top: 25px; 
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        
        th, td { border: 1px solid #e2e8f0; padding: 10px 14px; text-align: center; }
        th:nth-child(2), td:nth-child(2) { text-align: left; }
        
        th { background-color: #334155; color: #ffffff; font-weight: 600; }
        tr:nth-child(even) { background-color: #f8fafc; }
        tr:hover td { background-color: #f1f5f9; }
        
        .erreur { color: #d32f2f; background: #ffebee; padding: 15px; border-left: 5px solid #d32f2f; margin-top: 20px; font-weight: bold; }

        /* BOUTONS */
        .zone-boutons { margin: 25px 0; display: flex; justify-content: center; gap: 12px; }
        
        /* Style par défaut des boutons quand ils ne sont pas cliqués (Gris clair) */
        .btn-classement { 
            background-color: #ffffff; 
            color: #64748b; 
            border: 1px solid #cbd5e1; 
            padding: 10px 18px; 
            font-size: 14px; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 6px; 
            transition: all 0.3s ease;
        }
        .btn-classement:hover { background-color: #f1f5f9; }
        
        /* Classes spécifiques pour l'activation des boutons */
        .btn-classement.actif-bleu { 
            background-color: #3b82f6 !important; 
            color: white !important; 
            border-color: #3b82f6 !important;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }
        
        .btn-classement.actif-violet { 
            background-color: #8b5cf6 !important; 
            color: white !important; 
            border-color: #8b5cf6 !important;
            box-shadow: 0 4px 6px -1px rgba(139, 92, 246, 0.3);
        }
    </style>
</head>
<body>

    <h2 style="text-align: center; color: #0f172a;">La T'Chaux</h2>

    <div class="zone-boutons">
        <button class="btn-classement" id="btn-24" onclick="chargerClassement('LaTChauxAnn.csv', 'btn-24')">Classement 2026</button>
        <button class="btn-classement" id="btn-ann" onclick="chargerClassement('LaTChaux24.csv', 'btn-ann')">Classement Moonndiiaaaallll</button>
    </div>

    <div id="tableau-contenu">Chargement des données en cours...</div>

    <script>
        function chargerClassement(fichierCSV, idBouton) {
            document.getElementById('tableau-contenu').innerHTML = "Chargement des données en cours...";
            
            // Nettoyage complet des styles actifs sur tous les boutons
            document.querySelectorAll('.btn-classement').forEach(btn => {
                btn.classList.remove('actif-bleu', 'actif-violet');
            });

            // Application du fond de page et de la couleur du bouton selon le fichier sélectionné
            if (idBouton === 'btn-24') {
                document.body.style.backgroundColor = "#eff6ff"; // Fond bleu très clair
                document.getElementById(idBouton).classList.add('actif-bleu');
            } else {
                document.body.style.backgroundColor = "#faf5ff"; // Fond violet très clair
                document.getElementById(idBouton).classList.add('actif-violet');
            }

            var xhr = new XMLHttpRequest();
            xhr.open("GET", fichierCSV, true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        var lignes = xhr.responseText.split(/\r\n|\n/);
                        var html = '<table>';
                        var lignesCrees = 0;

                        for (var i = 0; i < lignes.length; i++) {
                            if (lignes[i].trim() === "") continue;
                            
                            var cellules = lignes[i].split(",");
                            html += '<tr>';
                            for (var j = 0; j < cellules.length; j++) {
                                if (lignesCrees === 0) {
                                    html += '<th>' + cellules[j] + '</th>';
                                } else {
                                    html += '<td>' + cellules[j] + '</td>';
                                }
                            }
                            html += '</tr>';
                            lignesCrees++;
                        }
                        html += '</table>';
                        
                        if (lignesCrees === 0) {
                            document.getElementById('tableau-contenu').innerHTML = "<div class='erreur'>⚠️ Le fichier CSV a été trouvé mais il semble vide.</div>";
                        } else {
                            document.getElementById('tableau-contenu').innerHTML = html;
                        }
                    } else {
                        document.getElementById('tableau-contenu').innerHTML = "<div class='erreur'>⚠️ Impossible de lire le fichier <code>" + fichierCSV + "</code>. Vérifiez qu'il est bien présent à la racine de votre projet GitHub.</div>";
                    }
                }
            };
            xhr.send();
        }

        chargerClassement("LaTChauxAnn.csv", "btn-24");
    </script>

</body>
</html>
