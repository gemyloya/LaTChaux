<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Visualisation de mon fichier</title>
    <!-- Outil officiel de lecture de CSV -->
    <script src="https://cloudflare.com"></script>
        <style>
        /* CHANGEMENT COSMÉTIQUE : Centrage et largeur maximale à 1000px */
        body { font-family: sans-serif; margin: 40px auto; max-width: 600px; padding: 0 20px; color: #333; }
        
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        
        /* 1. On centre TOUTES les colonnes par défaut */
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        
        /* 2. FORCE la 2ème colonne (titre et cellules) à s'aligner à gauche */
        th:nth-child(2), td:nth-child(2) { text-align: left; }
        
        th { background-color: #2c3e50; color: #ffffff; font-weight: bold; cursor: pointer; user-select: none; }
        th:hover { background-color: #34495e; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .erreur { color: #d32f2f; background: #ffebee; padding: 15px; border-left: 5px solid #d32f2f; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- CHANGEMENT TEXTUEL : Votre nouveau titre -->
    <h2>… et alors, le classement mooooonnnndiiiallllllllll</h2>
    <div id="tableau-contenu">Chargement des données en cours...</div>

    <script>
        /* CHANGEMENT TEXTUEL : Votre vrai nom de fichier */
        const fichierCSV = "LaTChaux24.csv"; 

        // Vérification de sécurité pour s'assurer que l'outil de lecture est bien chargé
        if (typeof Papa === 'undefined') {
            document.getElementById('tableau-contenu').innerHTML = "<div class='erreur'>⚠️ Erreur critique : L'outil PapaParse n'a pas pu être chargé depuis internet. Vérifiez votre connexion ou les restrictions de votre réseau.</div>";
        } else {
            Papa.parse(fichierCSV, {
                download: true,
                header: false,
                skipEmptyLines: true, // Supprime automatiquement les lignes vides
                complete: function(results) {
                    if (!results.data || results.data.length === 0) {
                        document.getElementById('tableau-contenu').innerHTML = "<div class='erreur'>⚠️ Le fichier CSV a été trouvé mais il semble complètement vide.</div>";
                        return;
                    }

                    let html = '<table>';
                    results.data.forEach((row, index) => {
                        html += '<tr>';
                        row.forEach(cell => {
                            html += index === 0 ? `<th>${cell}</th>` : `<td>${cell}</td>`;
                        });
                        html += '</tr>';
                    });
                    html += '</table>';
                    document.getElementById('tableau-contenu').innerHTML = html;

                    // AJOUT DU TRI : On appelle le trieur une fois le tableau affiché
                    activerLeTriDuTableau();
                },
                error: function(err) {
                    // Si le fichier est introuvable ou bloqué, ce message s'affichera directement à l'écran
                    document.getElementById('tableau-contenu').innerHTML = `
                        <div class='erreur'>
                            ⚠️ Impossible de lire le fichier CSV.<br><br>
                            <span style='font-weight:normal; font-size:14px;'>
                                <b>Détails techniques :</b> Le fichier nommé <code>"${fichierCSV}"</code> est introuvable à la racine de votre projet ou son nom contient une erreur de majuscule/minuscule.
                            </span>
                        </div>`;
                }
            });
        }

        // Script de tri autonome ajouté à la suite, sans toucher au reste
        function activerLeTriDuTableau() {
            const table = document.querySelector("table");
            if (!table) return;
            const headers = table.querySelectorAll("th");
            
            headers.forEach((th, index) => {
                let ordreCroissant = true;
                th.addEventListener("click", () => {
                    const lignes = Array.from(table.querySelectorAll("tr")).slice(1);
                    
                    lignes.sort((lignA, lignB) => {
                        const texteA = lignA.children[index].textContent.trim();
                        const texteB = lignB.children[index].textContent.trim();
                        
                        const numA = parseFloat(texteA);
                        const numB = parseFloat(texteB);
                        
                        if (!isNaN(numA) && !isNaN(numB)) {
                            return ordreCroissant ? numA - numB : numB - numA;
                        }
                        return ordreCroissant ? texteA.localeCompare(texteB) : texteB.localeCompare(texteA);
                    });
                    
                    lignes.forEach(lign => table.appendChild(lign));
                    ordreCroissant = !ordreCroissant;
                });
            });
        }
    </script>

</body>
</html>
