<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Visualisation de mon fichier</title>
    <style>
        body { font-family: sans-serif; margin: 40px auto; max-width: 600px; padding: 0 20px; color: #333; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th:nth-child(2), td:nth-child(2) { text-align: left; }
        th { background-color: #2c3e50; color: #ffffff; font-weight: bold; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .erreur { color: #d32f2f; background: #ffebee; padding: 15px; border-left: 5px solid #d32f2f; margin-top: 20px; font-weight: bold; }
        .zone-boutons { margin: 20px 0; display: flex; gap: 10px; }
        .btn-classement { background-color: #2c3e50; color: white; border: none; padding: 10px 15px; font-size: 14px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .btn-classement:hover { background-color: #34495e; }
        .btn-classement.actif { background-color: #27ae60; }
    </style>
</head>
<body>

    <h2>La T'Chaux</h2>

    <div class="zone-boutons">
        <button class="btn-classement actif" id="btn-24" onclick="chargerClassement('LaTChauxAnn.csv', 'btn-24')">Classement 2026</button>
        <button class="btn-classement" id="btn-ann" onclick="chargerClassement('LaTChaux24.csv', 'btn-ann')">Classement Moonndiiaaaallll</button>
    </div>

    <div id="tableau-contenu">Chargement des données en cours...</div>

    <script>
        function chargerClassement(fichierCSV, idBouton) {
            document.getElementById('tableau-contenu').innerHTML = "Chargement des données en cours...";
            document.querySelectorAll('.btn-classement').forEach(btn => btn.classList.remove('actif'));
            document.getElementById(idBouton).classList.add('actif');

            // Lecture directe du fichier sans aucun outil externe
            var xhr = new XMLHttpRequest();
            xhr.open("GET", fichierCSV, true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        var lignes = xhr.responseText.split(/\r\n|\n/);
                        var html = '<table>';
                        var lignesCrees = 0;

                        for (var i = 0; i < lignes.length; i++) {
                            if (lignes[i].trim() === "") continue;
                            
                            // Découpage de la ligne par les virgules
                            var cellules = lignes[i].split(",");
                            html += '<tr>';
                            for (var j = 0; j < cellules.length; j++) {
                                if (lignesCrees === 0) {
                                    html += '<th>' + cellules[j] + '</th>';
                                } else {
                                    html += '<td>' + cellules[j] + '</td>';
                                }
                            }
                            html += '</tr>';
                            lignesCrees++;
                        }
                        html += '</table>';
                        
                        if (lignesCrees === 0) {
                            document.getElementById('tableau-contenu').innerHTML = "<div class='erreur'>⚠️ Le fichier CSV a été trouvé mais il semble vide.</div>";
                        } else {
                            document.getElementById('tableau-contenu').innerHTML = html;
                        }
                    } else {
                        document.getElementById('tableau-contenu').innerHTML = "<div class='erreur'>⚠️ Impossible de lire le fichier <code>" + fichierCSV + "</code>. Vérifiez qu'il est bien présent à la racine de votre projet GitHub.</div>";
                    }
                }
            };
            xhr.send();
        }

        // Chargement automatique au démarrage de la page
        chargerClassement("LaTChauxAnn.csv", "btn-24");
    </script>

</body>
</html>
